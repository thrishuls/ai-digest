name: Daily AI Digest

on:
  schedule:
    - cron: '30 2 * * *'   # 02:30 UTC = 08:00 IST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build digest
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_REFERER: https://github.com/${{ github.repository }}
        run: python news_digest.py

      - name: Commit and push
        run: |
          git config user.name "ai-digest-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No site changes to commit."
          else
            git commit -m "Digest $(TZ=Asia/Kolkata date +%Y-%m-%d)"
            git push
          fi
 
