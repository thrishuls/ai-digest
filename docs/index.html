<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>The AI Daily — Setting up</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,900;1,9..144,500&family=JetBrains+Mono:wght@400&family=Inter+Tight:wght@400&display=swap">
<style>
:root{--paper:oklch(0.962 0.018 82);--ink:oklch(0.18 0.012 60);--ink-2:oklch(0.32 0.012 60);--ink-3:oklch(0.5 0.012 60);--accent:oklch(0.66 0.21 45);--rule:oklch(0.82 0.02 70);}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:var(--paper);color:var(--ink);font-family:"Inter Tight",ui-sans-serif,system-ui,sans-serif;background-image:radial-gradient(circle at 1px 1px,oklch(0.78 0.02 70 / 0.08) 0.7px,transparent 0.7px);background-size:3px 3px;min-height:100vh;}
.wrap{max-width:520px;margin:0 auto;padding:18px 18px 60px;border-left:1px solid var(--rule);border-right:1px solid var(--rule);min-height:100vh;}
@media (max-width:540px){.wrap{border:0;}}
.masthead{padding:18px 0 14px;border-bottom:2px solid var(--ink);}
.row{display:flex;justify-content:space-between;align-items:center;}
.meta{font-family:"JetBrains Mono",monospace;font-size:9.5px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink-3);}
.title{margin:6px 0 8px;font-family:"Fraunces",Georgia,serif;font-weight:900;font-size:64px;line-height:0.85;letter-spacing:-0.035em;color:var(--ink);text-align:center;}
.the{display:block;font-family:"Fraunces",Georgia,serif;font-weight:500;font-style:italic;font-size:22px;color:var(--ink-2);margin-bottom:-4px;}
.body{padding:48px 4px;text-align:left;}
.body h2{font-family:"Fraunces",Georgia,serif;font-style:italic;font-weight:500;font-size:26px;color:var(--accent);margin:0 0 12px;}
.body p{font-family:"Fraunces",Georgia,serif;font-size:16px;line-height:1.5;color:var(--ink-2);margin:0 0 12px;}
.body code{background:rgba(0,0,0,0.05);padding:2px 6px;border-radius:3px;font-size:14px;font-family:"JetBrains Mono",monospace;}
</style>
</head><body><div class="wrap">
<header class="masthead">
  <div class="row">
    <span class="meta">Vol. 01 · No. 000</span>
    <span class="meta">est. 2026</span>
  </div>
  <h1 class="title">
    <span class="the">The</span>
    <span>AI Daily</span>
  </h1>
</header>
<div class="body">
  <h2>Setting up.</h2>
  <p>The first edition lands here after the next scheduled run (08:00 IST), or as soon as you trigger the workflow manually from <code>Actions → Daily AI Digest → Run workflow</code>.</p>
  <p>Bookmark this page.</p>
</div>
</div></body></html>
